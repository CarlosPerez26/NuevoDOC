# ================================
# General
# ================================
set -g history-limit 10000
setw -g mode-keys vi
set -g mouse off

# Colores correctos
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ================================
# Prefijo más cómodo
# ================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ================================
# Split panes más intuitivos
# ================================
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# ================================
# Recarga rápida
# ================================
bind r source-file ~/.tmux.conf \; display "tmux.conf recargado"

# ================================
# Status bar
# ================================
set -g status-bg colour234
set -g status-fg colour136
set -g status-left "#[fg=colour39] #S "
set -g status-right "#[fg=colour245]%H:%M #[fg=colour240]%Y-%m-%d "

